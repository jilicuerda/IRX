<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>iRX Web Dashboard</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f4f9; 
            padding: 20px; 
            color: black;
        }
        h1 { color: #b30000; }
        
        .container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* Le style exact de ton ancien DragDropListWidget */
        .drop-zone { 
            flex: 1;
            background-color: #ffffff;
            border: 2px dashed #b30000; 
            border-radius: 8px; 
            padding: 15px; 
            min-height: 150px;
        }
        .drop-zone:hover {
            border-color: #ff4d4d;
        }
        .drop-zone h3 {
            margin-top: 0;
            color: #4a0000;
            font-size: 16px;
        }
        
        /* Style des listes de fichiers */
        ul { list-style-type: none; padding: 0; }
        li { background: #ffe6e6; margin: 5px 0; padding: 5px; border-radius: 4px; font-size: 14px; border: 1px solid #b30000;}

        button { 
            background: #b30000; 
            color: white; 
            padding: 15px 30px; 
            border: none; 
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer; 
            border-radius: 5px;
            width: 100%;
        }
        button:hover { background: #ff4d4d; }
        
        .result-box {
            border: 2px solid #b30000;
            padding: 20px;
            background: white;
            margin-top: 20px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>🔬 iRX Laboratory Dashboard</h1>
    
    <div class="container">
        <div class="drop-zone">
            <h3>📂 1-Phase Images</h3>
            <input type="file" id="input1p" multiple accept=".tif,.tiff" onchange="updateList('input1p', 'list1p')">
            <ul id="list1p"></ul>
        </div>

        <div class="drop-zone">
            <h3>📂 2-Phases Images</h3>
            <input type="file" id="input2p" multiple accept=".tif,.tiff" onchange="updateList('input2p', 'list2p')">
            <ul id="list2p"></ul>
        </div>
    </div>

    <div class="container">
        <div class="drop-zone">
            <h3>📂 3-Phases Images (E1)</h3>
            <input type="file" id="input3pE1" multiple accept=".tif,.tiff" onchange="updateList('input3pE1', 'list3pE1')">
            <ul id="list3pE1"></ul>
        </div>

        <div class="drop-zone">
            <h3>📂 3-Phases Images (E2)</h3>
            <input type="file" id="input3pE2" multiple accept=".tif,.tiff" onchange="updateList('input3pE2', 'list3pE2')">
            <ul id="list3pE2"></ul>
        </div>
    </div>

    <button onclick="lancerCalcul()">🚀 Perform Analysis & Update</button>

    <div class="result-box" id="resultatBox" style="display:none;">
        <h3 style="margin-top:0;">Terminal Serveur :</h3>
        <p id="affichageConsole"></p>
    </div>

    <script>
        // Fonction pour afficher le nom des fichiers sélectionnés sous l'input
        function updateList(inputId, listId) {
            const input = document.getElementById(inputId);
            const list = document.getElementById(listId);
            list.innerHTML = ""; // On vide la liste
            for (let i = 0; i < input.files.length; i++) {
                let li = document.createElement("li");
                li.innerText = input.files[i].name;
                list.appendChild(li);
            }
        }

        // Fonction principale d'envoi
        async function lancerCalcul() {
            const files1p = document.getElementById('input1p').files;
            const files2p = document.getElementById('input2p').files;
            const files3pE1 = document.getElementById('input3pE1').files;
            const files3pE2 = document.getElementById('input3pE2').files;

            const formData = new FormData();

            // On boucle pour ajouter tous les fichiers sélectionnés avec leurs clés respectives
            for(let i=0; i < files1p.length; i++) formData.append("images_1p", files1p[i]);
            for(let i=0; i < files2p.length; i++) formData.append("images_2p", files2p[i]);
            for(let i=0; i < files3pE1.length; i++) formData.append("images_3pe1", files3pE1[i]);
            for(let i=0; i < files3pE2.length; i++) formData.append("images_3pe2", files3pE2[i]);

            document.getElementById('resultatBox').style.display = "block";
            document.getElementById('affichageConsole').innerText = "Envoi des fichiers au serveur FastAPI...";

            try {
                const response = await fetch("/api/process_phases", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                if (data.status === "success") {
                    document.getElementById('affichageConsole').innerText = 
                        `Succès ! Le serveur a reçu :\n` +
                        `- ${data.counts.phase1} images 1-Phase\n` +
                        `- ${data.counts.phase2} images 2-Phases\n` +
                        `- ${data.counts.phase3_e1} images 3-Phases (E1)\n` +
                        `- ${data.counts.phase3_e2} images 3-Phases (E2)`;
                } else {
                    alert("Erreur Python : " + data.message);
                }
            } catch (error) {
                console.error("Erreur réseau :", error);
                document.getElementById('affichageConsole').innerText = "Erreur de connexion au serveur.";
            }
        }
    </script>
</body>
</html>
