<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>iRX Web Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        h1 { color: #b30000; }
        .box { border: 2px dashed #b30000; padding: 20px; background: white; margin-bottom: 20px; border-radius: 5px;}
        .solid-box { border: 2px solid #b30000; padding: 20px; background: white; margin-bottom: 20px; border-radius: 5px;}
        button { background: #b30000; color: white; padding: 10px 20px; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
        button:hover { background: #ff4d4d; }
        select, input { padding: 5px; margin-right: 15px; border: 1px solid #ccc; border-radius: 4px;}
        .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    </style>
</head>
<body>

    <h1>🔬 iRX Laboratory Dashboard</h1>
    
    <div class="box">
        <h3>📂 1. Chargement des images 1-Phase</h3>
        <input type="file" id="input1p" multiple accept=".tif,.tiff">
        <button onclick="uploadImages()">📤 Charger dans la mémoire du serveur</button>
        <p id="uploadStatus" style="color: green; font-weight: bold;"></p>
    </div>

    <div class="solid-box">
        <h3>🧮 2. Calcul du coefficient d'atténuation (Mu)</h3>
        
        <label>Name:</label>
        <input type="text" id="muName" placeholder="Ex: FW_init">
        
        <label>Diameter (cm):</label>
        <input type="number" id="muDiameter" value="1.0" step="0.1">
        
        <br><br>
        
        <label>Dry:</label>
        <select id="drySelect"><option value="">-- Charger des images d'abord --</option></select>
        
        <label>Fluid:</label>
        <select id="fluidSelect"><option value="">-- Charger des images d'abord --</option></select>
        
        <br><br>
        <button onclick="computeMu()">🚀 Compute Mu</button>
        
        <p id="muResult" style="font-size: 18px; font-weight: bold; color: #b30000;"></p>
        
        <div style="width: 100%; max-width: 600px; margin-top: 20px;">
            <canvas id="muChart"></canvas>
        </div>
    </div>

    <script>
        let muChartInstance = null; // Pour stocker le graphique

        // 1. Fonction d'envoi des images
        async function uploadImages() {
            const files1p = document.getElementById('input1p').files;
            if (files1p.length === 0) { alert("Sélectionnez au moins une image !"); return; }

            const formData = new FormData();
            for(let i=0; i < files1p.length; i++) formData.append("images_1p", files1p[i]);

            document.getElementById('uploadStatus').innerText = "Téléchargement en cours...";

            try {
                const response = await fetch("/api/upload_images", { method: "POST", body: formData });
                const data = await response.json();

                if (data.status === "success") {
                    document.getElementById('uploadStatus').innerText = "Images chargées en mémoire : " + data.loaded_images.join(", ");
                    
                    // Remplissage automatique des menus déroulants !
                    const drySelect = document.getElementById('drySelect');
                    const fluidSelect = document.getElementById('fluidSelect');
                    drySelect.innerHTML = ""; fluidSelect.innerHTML = "";
                    
                    data.loaded_images.forEach(img => {
                        drySelect.add(new Option(img, img));
                        fluidSelect.add(new Option(img, img));
                    });
                } else {
                    alert("Erreur Serveur : " + data.message);
                }
            } catch (error) { console.error(error); }
        }

        // 2. Fonction de calcul du Mu
        async function computeMu() {
            const reqData = {
                name: document.getElementById('muName').value,
                diameter: parseFloat(document.getElementById('muDiameter').value),
                dry_name: document.getElementById('drySelect').value,
                fluid_name: document.getElementById('fluidSelect').value
            };

            if(!reqData.name || !reqData.dry_name) { alert("Remplissez tous les champs !"); return; }

            try {
                const response = await fetch("/api/compute_mu", {
                    method: "POST",
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(reqData)
                });
                
                const data = await response.json();

                if (data.status === "success") {
                    document.getElementById('muResult').innerText = `Moyenne de ${reqData.name} = ${data.mu_avg.toFixed(4)}`;
                    dessinerHistogramme(data.hist_bins, data.hist_counts, reqData.name);
                } else {
                    alert("Erreur Calcul : " + data.message);
                }
            } catch (error) { console.error(error); }
        }

        // 3. Dessiner l'histogramme avec Chart.js
        function dessinerHistogramme(bins, counts, name) {
            const ctx = document.getElementById('muChart').getContext('2d');
            
            // On nettoie l'ancien graphique s'il existe
            if(muChartInstance) { muChartInstance.destroy(); }
            
            // On prépare les labels (les valeurs de x)
            const labels = bins.slice(0, -1).map(b => b.toFixed(4));

            muChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: `Histogramme de Mu (${name})`,
                        data: counts,
                        backgroundColor: '#cc0000',
                        barPercentage: 1.0,
                        categoryPercentage: 1.0
                    }]
                },
                options: {
                    scales: {
                        x: { display: false }, // Cache les centaines de petits chiffres en X
                        y: { beginAtZero: true }
                    }
                }
            });
        }
    </script>
</body>
</html>
